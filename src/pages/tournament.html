<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Турнирная таблица</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <header class="page-header">
    <h1>Турнирная таблица</h1>
    <p>Double elimination</p>
  </header>

  <main class="tournament-wrapper">


    <!-- ══════════ МАЛЬЧИКИ ══════════ -->
    <div id="boys-tournament" class="tournament-block">

      <div class="tournament-block__header">
        <span class="section__icon" style="background: var(--boys-accent);"></span>
        <h2 class="tournament-block__title">Мальчики</h2>
      </div>

      <!-- ВЕРХНЯЯ СЕТКА -->
      <div id="boys-winners-bracket" class="bracket-group" data-bracket="winners">

        <p class="bracket-group__title">Верхняя сетка</p>

        <div class="bracket-headers">
          <!-- renderRoundsNumbers() -->
        </div>

        <div class="bracket">
          <!-- renderMatch -->
        </div>
      </div>

      <!-- НИЖНЯЯ СЕТКА -->
      <div id="boys-losers-bracket" class="bracket-group" data-bracket="losers">

        <p class="bracket-group__title">Нижняя сетка</p>

        <div class="bracket-headers">
          <!-- renderRoundsNumbers -->
        </div>

        <div class="bracket">
          <!-- renderMatch -->
        </div>
      </div>

      <!-- ГРАНД-ФИНАЛ -->
      <div id="boys-grand-final" class="grand-final">
        <p class="grand-final__label">Гранд-финал</p>
        <div class="bracket__match" data-match-id="bgf1">
          <!-- renderGrandFinal -->
        </div>
      </div>

    </div>


    <!-- ══════════ ДЕВОЧКИ ══════════ -->
    <div id="girls-tournament" class="tournament-block">

      <div class="tournament-block__header">
        <span class="section__icon" style="background: var(--girls-accent);"></span>
        <h2 class="tournament-block__title">Девочки</h2>
      </div>

      <!-- ВЕРХНЯЯ СЕТКА -->
      <div id="girls-winners-bracket" class="bracket-group" data-bracket="winners">

        <p class="bracket-group__title">Верхняя сетка</p>

        <div class="bracket-headers">
          <!-- renderRoundsNumbers -->
        </div>

        <div class="bracket">
          <!-- renderMatch -->
        </div>
      </div>

      <!-- НИЖНЯЯ СЕТКА -->
      <div id="girls-losers-bracket" class="bracket-group" data-bracket="losers">

        <p class="bracket-group__title">Нижняя сетка</p>

        <div class="bracket-headers">
          <!-- renderRoundsNumbers -->
        </div>

        <div class="bracket">
          <!-- renderMatch -->
        </div>
      </div>

      <!-- ГРАНД-ФИНАЛ -->
      <div id="girls-grand-final" class="grand-final">
        <p class="grand-final__label">Гранд-финал</p>
        <div class="bracket__match" data-match-id="ggf1">
          <!-- renderGrandFinal -->
        </div>
      </div>

    </div>

  </main>

  <script type="module" src="../features/tournament.js"></script>

</body>
</html>
